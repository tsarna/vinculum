name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

env:
  IMAGE_NAME: ${{ github.repository_owner }}/vinculum
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build timestamp
        id: build_time
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # The default (alpine) image installs the host binary as a versioned
      # Go module so it is ABI-compatible with dependency-built plugins (see
      # Dockerfile). Tag builds use the tag (vX.Y.Z); branch builds use the
      # commit SHA, which resolves to a pseudo-version.
      - name: Compute vinculum module ref
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # The image tag the post-push smoke gate will pull and test. For a tag
      # build this is the semver without the leading "v" (matches the
      # {{version}} tag produced by docker/metadata-action).
      - name: Compute smoke-test image tag
        id: smoke_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            ref="${{ github.ref_name }}"
            echo "tag=${ref#v}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # ── Tag strategy ─────────────────────────────────────────────────────
      # main      → :latest        (minimal: :latest-minimal)
      # develop   → :dev           (minimal: :dev-minimal)
      # v1.2.3    → :1.2.3, :1.2, :1  (minimal: :1.2.3-minimal, ...)
      - name: Docker metadata (alpine)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata (minimal)
        id: meta-minimal
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-minimal,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata (build)
        id: meta-build
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/vinculum-build
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.time }}
            VINCULUM_REF=${{ steps.ref.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build and push minimal image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.minimal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-minimal.outputs.tags }}
          labels: ${{ steps.meta-minimal.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build and push plugin build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-build.outputs.tags }}
          labels: ${{ steps.meta-build.outputs.labels }}
          build-args: |
            VINCULUM_VERSION=${{ steps.ref.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

    outputs:
      # The image tag to smoke-test (semver for tags, latest/dev for branches)
      # and the go-installable vinculum ref the plugin must require.
      image_tag: ${{ steps.smoke_tag.outputs.tag }}
      vinculum_ref: ${{ steps.ref.outputs.ref }}

  # Release gate: prove the just-pushed images can actually build and load a
  # plugin via the documented container workflow. This runs after push and
  # fails the run if the plugin does not load — catching cgo/ABI regressions
  # before a release is treated as good. (amd64 only; same source as arm64.)
  plugin-smoke:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      VINCULUM_REF: ${{ needs.build-and-push.outputs.vinculum_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build fixture plugin in the published vinculum-build image
        run: |
          set -euxo pipefail
          mkdir -p out
          cp -r testdata/plugin-smoke smoke
          docker run --rm \
            -v "$PWD/smoke":/plugin -w /plugin \
            -v "$PWD/out":/out \
            "ghcr.io/${{ env.IMAGE_NAME }}-build:${IMAGE_TAG}" sh -euc "
              go mod edit -require=github.com/tsarna/vinculum@${VINCULUM_REF}
              go mod tidy
              vinculum-plugin-build -o /out/smoke.so .
            "

      - name: Load the plugin in the published runtime image
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$PWD/out/smoke.so":/plugins/smoke.so:ro \
            -v "$PWD/smoke/conf":/conf:ro \
            "ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            check --plugin-path /plugins /conf
