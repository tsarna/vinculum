name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Extract the CHANGELOG section for this tag to use as the release body.
      # Written outside the working tree so GoReleaser doesn't see a dirty repo.
      # Fails the release if the section is missing or empty, so a forgotten
      # changelog entry can't ship a blank GitHub Release.
      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md | sed '/./,$!d' > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "::error::No CHANGELOG.md section found for $version" >&2
            exit 1
          fi
          echo "----- release notes -----"
          cat "$RUNNER_TEMP/release-notes.md"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token so GoReleaser can push the Homebrew cask to the tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # GoReleaser's --release-notes doesn't populate the body when the
      # changelog is disabled, so set it on the release it just created.
      - name: Set release notes from changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
